<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MCQ Result</title>
    <link rel="stylesheet" href="../../CSS/user/view-results.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="navbar">
      <h1>Exam Portal</h1>

      <div class="user-dropdown">
        <span id="user-name"></span>
        <span class="dropdown-arrow">▾</span>
        <div class="dropdown-content">
          <button id="logout-btn">Logout</button>
        </div>
      </div>
    </header>

    <div class="result-container">
      <h2>Test Results</h2>

      <table class="result-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Question</th>
            <th>Your Answer</th>
            <th>Correct Answer</th>
            <th>Marks</th>
            <th>Marks Scored</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="main-body">
          <!-- <tr class="correct">
            <td>1</td>
            <td>What is RAM?</td>
            <td>Volatile Memory</td>
            <td>Volatile Memory</td>
            <td>2</td>
            <td>2</td>
            <td>✔ Correct</td>
          </tr>

          <tr class="wrong">
            <td>2</td>
            <td>HTML is a ___?</td>
            <td>Programming Language</td>
            <td>Markup Language</td>
            <td>1</td>
            <td>0</td>
            <td>✖ Wrong</td>
          </tr> -->
        </tbody>
      </table>

      <div class="summary">
        <p id="total-marks"></p>
        <p id="marks-obtained"></p>
        <!-- <p class="pass">Status: PASSED ✅</p> -->
        <!-- <p class="fail">Status: FAILED ❌</p> -->
      </div>

      <button id="back-btn" onclick="window.location.href = '/AttemptedTests'">
        Back to Home
      </button>
    </div>
    <script src="../../JS/user/view-results.js"></script>
  </body>
</html>
